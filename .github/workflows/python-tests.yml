name: Python tests

on:
  push:
    branches: [master]
  pull_request_target:

jobs:
  get-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Get fixtures
        uses: actions/checkout@v6
        with:
          submodules: recursive
          ssh-key: ${{ secrets.PSPTOOL_FIXTURES_NEW_PRIVATE_KEY }}

      - name: Save fixtures
        uses: actions/upload-artifact@v7
        with:
          name: saved-fixtures
          path: tests/integration/fixtures

  test:
    needs: get-fixtures
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout PR
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}

      - name: Download fixtures
        uses: actions/download-artifact@v8
        with:
          name: saved-fixtures
          path: tests/integration/fixtures
        
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psptrace
          pip install ".[lint]"

      - name: Lint with flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      - name: Test with unittest
        run: |
          python -m unittest discover -s tests -v

      - name: Create Metrics
        if: matrix.python-version == '3.14' && github.event_name == 'pull_request_target'
        run: |
          python tests/gha_metrics.py > metrics.md
          cat metrics.md >> $GITHUB_STEP_SUMMARY

      - name: Upload metrics
        if: matrix.python-version == '3.14' && github.event_name == 'pull_request_target'
        uses: actions/upload-artifact@v7
        with:
          name: metrics-data
          path: |
            metrics.md
